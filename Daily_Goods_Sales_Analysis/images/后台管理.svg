  .label { font: 500 15px "Microsoft YaHei", Arial, sans-serif; fill: #65758b; }
  .value { font: 700 30px "Microsoft YaHei", Arial, sans-serif; fill: #172033; }
  .small { font: 400 13px "Microsoft YaHei", Arial, sans-serif; fill: #65758b; }
  .axis { stroke: #c9d3e3; stroke-width: 1; }
  .grid { stroke: #edf1f7; stroke-width: 1; }
</style>

